name: Release private-test bundle

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build bundle
        shell: pwsh
        run: ./tools/package_private_bundle.ps1
      - name: Create manifest
        shell: pwsh
        run: |
          $asset = Get-ChildItem ./dist/RemnantsMPBridge-*.zip | Select-Object -First 1
          $version = '${{ github.ref_name }}'.TrimStart('v')
          $manifest = [ordered]@{
            version = $version
            assetUrl = "https://github.com/${{ github.repository }}/releases/download/${{ github.ref_name }}/$($asset.Name)"
            sha256 = (Get-FileHash -Algorithm SHA256 $asset).Hash
          }
          $manifest | ConvertTo-Json | Set-Content -Encoding utf8NoBOM ./dist/latest.json
      - name: Publish release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $asset = Get-ChildItem ./dist/RemnantsMPBridge-*.zip | Select-Object -First 1
          gh release create '${{ github.ref_name }}' $asset.FullName ./dist/latest.json --generate-notes --title '${{ github.ref_name }}'
